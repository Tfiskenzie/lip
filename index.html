<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost In Playbck — Now Playing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --amber: #FFBD59;
    --amber-deep: #F2A93B;
    --ink: #0D0D0D;
    --ink-soft: #1c1a17;
    --cream: #FFF6E6;
    --line: rgba(13,13,13,0.14);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:transparent;
    color:var(--cream);
    font-family:'Baloo 2', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px 40px;
    position:relative;
  }

  .bg-video{
    position:fixed;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
    background:#0a0512;
    filter:brightness(0.85) saturate(1.1);
  }

  .bg-overlay{
    position:fixed;
    inset:0;
    z-index:-1;
    background:
      radial-gradient(ellipse at center, rgba(10,4,20,0) 0%, rgba(8,3,16,0.25) 60%, rgba(5,2,10,0.55) 100%);
  }

  .player{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---------- header ---------- */

  .logo{
    width:min(34%, 120px);
    height:auto;
    display:block;
    margin:0 auto 8px;
  }

  .eyebrow{
    margin:0 0 34px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--cream);
    opacity:0.7;
  }

  .eyebrow::before{
    content:'';
    display:inline-block;
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--cream);
    margin-right:9px;
    opacity:0.8;
    vertical-align:middle;
    animation:pulse 1.6s ease-in-out infinite;
  }
  .player.is-playing .eyebrow::before{ animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{
    0%,100%{ opacity:.25; transform:scale(0.8); }
    50%{ opacity:.9; transform:scale(1); }
  }

  /* ---------- turntable ---------- */

  .turntable{
    position:relative;
    width:100%;
    max-width:230px;
    aspect-ratio:1/1;
    margin-bottom:22px;
  }

  .disc{
    position:absolute;
    inset:0;
    border-radius:50%;
    overflow:hidden;
    box-shadow:
      0 22px 40px -14px rgba(13,13,13,0.55),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    animation: spin 5.5s linear infinite;
    animation-play-state: paused;
  }

  .disc-img{
    position:absolute;
    inset:0;
    width:100%;
    height:100%;
    object-fit:cover;
    background:var(--ink);
    display:block;
  }

  .disc::before{
    /* sheen */
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
    background:linear-gradient(115deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 26%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.05) 100%);
    pointer-events:none;
  }

  .player.is-playing .disc{ animation-play-state: running; }

  @keyframes spin{
    to{ transform:rotate(360deg); }
  }

  /* picture disc: art runs edge-to-edge, only the spindle hole sits on top */
  .label{
    position:absolute;
    top:50%; left:50%;
    width:0;
    height:0;
    transform:translate(-50%,-50%);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .label .spindle{
    width:14px;
    height:14px;
    border-radius:50%;
    background:var(--ink);
    box-shadow:0 0 0 2px rgba(255,246,230,0.55);
    position:relative;
    z-index:2;
  }

  /* tonearm */
  .tonearm{
    position:absolute;
    top:-4%;
    right:-6%;
    width:46%;
    height:46%;
    transform-origin: 88% 12%;
    transform:rotate(-24deg);
    transition:transform 0.55s cubic-bezier(.4,0,.2,1);
    z-index:5;
  }
  .player.is-playing .tonearm{ transform:rotate(-3deg); }

  .tonearm .pivot{
    position:absolute;
    top:6%;
    right:6%;
    width:15%;
    height:15%;
    border-radius:50%;
    background:var(--ink);
    box-shadow:0 3px 6px rgba(13,13,13,0.35);
  }

  .tonearm .arm{
    position:absolute;
    top:12%;
    right:12%;
    width:5.5px;
    height:78%;
    background:var(--ink);
    border-radius:3px;
    transform-origin:top center;
    transform:rotate(34deg);
    box-shadow:0 2px 4px rgba(13,13,13,0.3);
  }

  .tonearm .headshell{
    position:absolute;
    bottom:-6px;
    left:50%;
    transform:translateX(-50%);
    width:16px;
    height:9px;
    background:var(--ink);
    border-radius:2px;
  }

  /* ---------- meta ---------- */

  .meta{
    text-align:center;
    margin:22px 0 20px;
  }

  .track-title{
    margin:0 0 8px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:34px;
    letter-spacing:0.01em;
    line-height:1.15;
  }

  .track-artist{
    margin:0;
    font-family:'IBM Plex Mono', monospace;
    font-size:16px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    opacity:0.65;
  }

  /* ---------- progress ---------- */

  .progress{
    width:100%;
    max-width:340px;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:26px;
  }

  .time{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    opacity:0.65;
    min-width:34px;
  }
  .time.end{ text-align:right; }

  .bar{
    position:relative;
    flex:1;
    height:16px;
    display:flex;
    align-items:center;
    cursor:pointer;
  }
  .bar .track-line{
    position:absolute;
    left:0; right:0;
    height:3px;
    border-radius:3px;
    background:rgba(255,246,230,0.22);
  }
  .bar .fill{
    position:absolute;
    left:0;
    height:3px;
    border-radius:3px;
    background:var(--cream);
    width:0%;
  }
  .bar .knob{
    position:absolute;
    left:0%;
    width:11px;
    height:11px;
    border-radius:50%;
    background:var(--cream);
    box-shadow:0 0 0 3px var(--amber), 0 0 0 4px rgba(5,2,10,0.35);
    transform:translateX(-50%);
  }

  /* ---------- controls ---------- */

  .controls{
    display:flex;
    align-items:center;
    gap:26px;
  }

  .controls button{
    -webkit-appearance:none;
    appearance:none;
    border:none;
    background:none;
    padding:0;
    cursor:pointer;
    color:var(--cream);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .controls button:focus-visible{
    outline:2px solid var(--cream);
    outline-offset:4px;
    border-radius:50%;
  }

  .skip-btn svg{ width:20px; height:20px; }
  .skip-btn{ opacity:0.75; transition:opacity .15s ease, transform .15s ease; }
  .skip-btn:hover{ opacity:1; transform:translateY(-1px); }

  .play-btn{
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--cream);
    box-shadow:0 10px 22px -8px rgba(13,13,13,0.55);
    transition:transform .15s ease;
  }
  .play-btn:hover{ transform:scale(1.04); }
  .play-btn:active{ transform:scale(0.96); }
  .play-btn svg{ width:22px; height:22px; }
  .play-btn .pause-icon{ display:none; }
  .player.is-playing .play-btn .play-icon{ display:none; }
  .player.is-playing .play-btn .pause-icon{ display:block; }

  @media (prefers-reduced-motion: reduce){
    .disc{ animation:none !important; }
    .tonearm{ transition:none; }
  }

  /* ---------- waveform ---------- */

  .waveform{
    width:100%;
    max-width:340px;
    height:88px;
    margin:0 0 24px;
    display:block;
    position:relative;
  }

  #waveCanvas{
    width:100%;
    height:100%;
    display:block;
    position:relative;
    z-index:1;
    transition:filter 0.6s ease;
    filter:drop-shadow(0 0 0 rgba(255,189,89,0));
  }
  .player.is-playing #waveCanvas{
    filter:drop-shadow(0 0 10px rgba(255,189,89,0.65)) drop-shadow(0 0 22px rgba(242,169,59,0.35));
  }
</style>
</head>

  <p class="eyebrow">Now Playing</p>

  <div class="turntable">

      <svg class="pause-icon" viewBox="0 0 24 24" fill="var(--ink)"><path d="M7 5h4v14H7zM13 5h4v14h-4z"/></svg>

<script>
/* -----------------------------------------------------------
   Vinyl image and audio are set directly on their tags above:
     <img id="discImage" src="vinyl-disc.jpg">
     <audio id="audio" src="track.mp3">
   Point those two src attributes at your own files — everything
   below just plays/pauses and tracks progress against them.
------------------------------------------------------------ */
let isPlaying = false;

const player = document.getElementById('player');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');
const fill = document.getElementById('fill');
const knob = document.getElementById('knob');
const bar = document.getElementById('bar');
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');

function formatTime(s){
  s = Math.max(0, Math.floor(s || 0));
  const m = Math.floor(s / 60);
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

function updateProgress(pos, dur){
  const pct = dur ? Math.min(100, (pos / dur) * 100) : 0;
  fill.style.width = pct + "%";
  knob.style.left = pct + "%";
  curTimeEl.textContent = formatTime(pos);
}

function play(){
  isPlaying = true;
  player.classList.add('is-playing');
  playBtn.setAttribute('aria-label', 'Pause');
  ensureAudioContext();
  if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
  audio.play().catch(() => {});
}

function pause(){
  isPlaying = false;
  player.classList.remove('is-playing');
  playBtn.setAttribute('aria-label', 'Play');
  audio.pause();
}

function togglePlay(){
  isPlaying ? pause() : play();
}

audio.addEventListener('timeupdate', () => updateProgress(audio.currentTime, audio.duration));
audio.addEventListener('loadedmetadata', () => { durTimeEl.textContent = formatTime(audio.duration); });
audio.addEventListener('ended', pause);

playBtn.addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', () => { audio.currentTime = Math.min(audio.duration || 0, audio.currentTime + 10); });
document.getElementById('prevBtn').addEventListener('click', () => { audio.currentTime = Math.max(0, audio.currentTime - 10); });

/* scrub */
function scrubTo(clientX){
  const rect = bar.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
  const dur = audio.duration || 0;
  const pos = pct * dur;
  audio.currentTime = pos;
  updateProgress(pos, dur);
}
let scrubbing = false;
bar.addEventListener('pointerdown', e => { scrubbing = true; scrubTo(e.clientX); });
window.addEventListener('pointermove', e => { if (scrubbing) scrubTo(e.clientX); });
window.addEventListener('pointerup', () => scrubbing = false);

/* -----------------------------------------------------------
   waveform visualizer — Web Audio API analyser drawn to canvas.
   Falls back to a gentle idle pulse when paused or before the
   AudioContext has been created (browsers require a user
   gesture, so it's created lazily on first play).
------------------------------------------------------------ */
let audioCtx, analyser, sourceNode, dataArray, bufferLength;

function ensureAudioContext(){
  if (audioCtx) return;
  try{
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    analyser = audioCtx.createAnalyser();
    analyser.fftSize = 128;
    analyser.smoothingTimeConstant = 0.82;
    bufferLength = analyser.frequencyBinCount;
    dataArray = new Uint8Array(bufferLength);
    sourceNode = audioCtx.createMediaElementSource(audio);
    sourceNode.connect(analyser);
    analyser.connect(audioCtx.destination);
  }catch(e){
    audioCtx = null; analyser = null;
  }
}

const waveCanvas = document.getElementById('waveCanvas');
const waveCtx = waveCanvas.getContext('2d');
const DOT_COUNT = 26;
let idlePhase = 0;
let glow = 0; // eases in/out with play state for a smooth pulsing glow
let hueShift = 0; // slowly cycles the dot colour while playing
const dotSeeds = Array.from({ length: DOT_COUNT }, () => 0.3 + Math.random() * 0.7);
const dotPhases = Array.from({ length: DOT_COUNT }, () => Math.random() * Math.PI * 2);
/* each dot has its own spring state so it bounces past its target
   and settles back, instead of just smoothly tracking the level */
const dotValue = Array.from({ length: DOT_COUNT }, () => 0);
const dotVelocity = Array.from({ length: DOT_COUNT }, () => 0);

function resizeWaveCanvas(){
  const dpr = window.devicePixelRatio || 1;
  const rect = waveCanvas.getBoundingClientRect();
  waveCanvas.width = Math.max(1, rect.width * dpr);
  waveCanvas.height = Math.max(1, rect.height * dpr);
  waveCtx.setTransform(dpr, 0, 0, dpr, 0, 0);
}
window.addEventListener('resize', resizeWaveCanvas);
resizeWaveCanvas();

function drawWave(){
  requestAnimationFrame(drawWave);
  const rect = waveCanvas.getBoundingClientRect();
  const w = rect.width, h = rect.height;
  if (!w || !h) return;
  waveCtx.clearRect(0, 0, w, h);

  const midY = h / 2;
  const levels = [];

  if (isPlaying && analyser){
    analyser.getByteFrequencyData(dataArray);
    for (let i = 0; i < DOT_COUNT; i++){
      const idx = Math.floor((i / DOT_COUNT) * bufferLength * 0.85);
      levels.push(dataArray[idx] / 255);
    }
  } else {
    idlePhase += 0.02;
    for (let i = 0; i < DOT_COUNT; i++){
      const wobble = 0.5 + 0.5 * Math.sin(idlePhase * 1.1 + dotPhases[i]);
      levels.push(0.06 + dotSeeds[i] * 0.18 * wobble);
    }
  }

  /* ease the glow amount toward its target so it ramps up/down
     smoothly whenever playback starts or stops */
  const targetGlow = isPlaying ? 1 : 0;
  glow += (targetGlow - glow) * 0.06;
  if (isPlaying) hueShift += 0.6;

  const step = w / (DOT_COUNT - 1);
  const hue = 34 + Math.sin(hueShift * 0.02) * 14; // gentle amber-to-gold cycle

  for (let i = 0; i < DOT_COUNT; i++){
    /* spring physics: each dot overshoots and bounces toward its
       target level rather than sliding smoothly, for a livelier feel */
    const target = Math.max(0.05, levels[i]);
    const stiffness = isPlaying ? 0.35 : 0.12;
    const damping = isPlaying ? 0.72 : 0.85;
    dotVelocity[i] += (target - dotValue[i]) * stiffness;
    dotVelocity[i] *= damping;
    dotValue[i] += dotVelocity[i];

    const amp = dotValue[i] * (h * 0.42);
    const x = i * step;
    const topY = midY - amp;
    const botY = midY + amp;
    const radius = 2.2 + glow * 1.4;

    const grad = waveCtx.createLinearGradient(0, topY, 0, botY);
    grad.addColorStop(0, `hsla(${hue}, 95%, 68%, 0.95)`);
    grad.addColorStop(0.5, `hsla(${hue - 10}, 20%, 10%, 0.9)`);
    grad.addColorStop(1, `hsla(${hue}, 95%, 68%, 0.95)`);

    waveCtx.strokeStyle = grad;
    waveCtx.lineWidth = 3;
    waveCtx.lineCap = 'round';
    waveCtx.shadowColor = `hsla(${hue}, 100%, 65%, 0.9)`;
    waveCtx.shadowBlur = 4 + glow * 12;

    /* the connecting capsule between the two dots */
    waveCtx.beginPath();
    waveCtx.moveTo(x, topY);
    waveCtx.lineTo(x, botY);
    waveCtx.stroke();

    /* glowing dot caps, pulsing slightly larger while playing */
    waveCtx.fillStyle = `hsla(${hue}, 100%, 72%, 1)`;
    waveCtx.beginPath();
    waveCtx.arc(x, topY, radius, 0, Math.PI * 2);
    waveCtx.fill();
    waveCtx.beginPath();
    waveCtx.arc(x, botY, radius, 0, Math.PI * 2);
    waveCtx.fill();
  }

  /* thin centre baseline */
  waveCtx.shadowBlur = 0;
  waveCtx.globalAlpha = 0.25;
  waveCtx.strokeStyle = 'rgba(255,246,230,0.4)';
  waveCtx.lineWidth = 1;
  waveCtx.beginPath();
  waveCtx.moveTo(0, midY);
  waveCtx.lineTo(w, midY);
  waveCtx.stroke();
  waveCtx.globalAlpha = 1;
}
drawWave();

</script>
