<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lost In Playbck — Now Playing</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+2:wght@500;600;700;800&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root{
    --amber: #FFBD59;
    --amber-deep: #F2A93B;
    --ink: #0D0D0D;
    --ink-soft: #1c1a17;
    --cream: #FFF6E6;
    --line: rgba(13,13,13,0.14);
  }

  *{ box-sizing:border-box; }

  html,body{
    margin:0;
    padding:0;
    background:var(--amber);
    color:var(--ink);
    font-family:'Baloo 2', system-ui, sans-serif;
    -webkit-font-smoothing:antialiased;
  }

  body{
    min-height:100svh;
    display:flex;
    align-items:center;
    justify-content:center;
    padding:32px 20px 40px;
    background-image:
      radial-gradient(circle, rgba(13,13,13,0.10) 1.6px, transparent 1.6px);
    background-size: 28px 28px;
    background-position: -4px -4px;
  }

  .player{
    width:100%;
    max-width:420px;
    display:flex;
    flex-direction:column;
    align-items:center;
  }

  /* ---------- header ---------- */

  .logo{
    width:min(78%, 300px);
    height:auto;
    display:block;
    margin:0 auto 6px;
  }

  .eyebrow{
    margin:0 0 34px;
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    font-weight:500;
    letter-spacing:0.32em;
    text-transform:uppercase;
    color:var(--ink);
    opacity:0.55;
  }

  .eyebrow::before{
    content:'';
    display:inline-block;
    width:6px;
    height:6px;
    border-radius:50%;
    background:var(--ink);
    margin-right:9px;
    opacity:0.7;
    vertical-align:middle;
    animation:pulse 1.6s ease-in-out infinite;
  }
  .player.is-playing .eyebrow::before{ animation:pulse 1.1s ease-in-out infinite; }
  @keyframes pulse{
    0%,100%{ opacity:.25; transform:scale(0.8); }
    50%{ opacity:.9; transform:scale(1); }
  }

  /* ---------- turntable ---------- */

  .turntable{
    position:relative;
    width:100%;
    max-width:340px;
    aspect-ratio:1/1;
    margin-bottom:8px;
  }

  .disc{
    position:absolute;
    inset:0;
    border-radius:50%;
    background:
      repeating-radial-gradient(circle at 50% 50%,
        #151310 0px, #151310 2px,
        #0a0908 3px, #0a0908 4px
      );
    box-shadow:
      0 22px 40px -14px rgba(13,13,13,0.55),
      inset 0 0 0 1px rgba(255,255,255,0.04);
    animation: spin 5.5s linear infinite;
    animation-play-state: paused;
  }

  .disc::before{
    /* sheen */
    content:'';
    position:absolute;
    inset:0;
    border-radius:50%;
    background:linear-gradient(115deg, rgba(255,255,255,0.10) 0%, rgba(255,255,255,0) 26%, rgba(255,255,255,0) 70%, rgba(255,255,255,0.05) 100%);
    pointer-events:none;
  }

  .player.is-playing .disc{ animation-play-state: running; }

  @keyframes spin{
    to{ transform:rotate(360deg); }
  }

  /* the label IS the album cover — no separate floating square */
  .label{
    position:absolute;
    top:50%; left:50%;
    width:38%;
    height:38%;
    transform:translate(-50%,-50%);
    border-radius:50%;
    overflow:hidden;
    box-shadow:
      0 0 0 3px var(--ink),
      0 0 0 4px rgba(255,255,255,0.06),
      inset 0 0 18px rgba(0,0,0,0.25);
    background-size:cover;
    background-position:center;
    transition:background 0.5s ease;
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .label .spindle{
    width:9%;
    height:9%;
    min-width:8px;
    min-height:8px;
    border-radius:50%;
    background:var(--ink);
    box-shadow:0 0 0 2px rgba(255,246,230,0.55);
    position:relative;
    z-index:2;
  }

  /* tonearm */
  .tonearm{
    position:absolute;
    top:-4%;
    right:-6%;
    width:46%;
    height:46%;
    transform-origin: 88% 12%;
    transform:rotate(-24deg);
    transition:transform 0.55s cubic-bezier(.4,0,.2,1);
    z-index:5;
  }
  .player.is-playing .tonearm{ transform:rotate(-3deg); }

  .tonearm .pivot{
    position:absolute;
    top:6%;
    right:6%;
    width:15%;
    height:15%;
    border-radius:50%;
    background:var(--ink);
    box-shadow:0 3px 6px rgba(13,13,13,0.35);
  }

  .tonearm .arm{
    position:absolute;
    top:12%;
    right:12%;
    width:5.5px;
    height:78%;
    background:var(--ink);
    border-radius:3px;
    transform-origin:top center;
    transform:rotate(34deg);
    box-shadow:0 2px 4px rgba(13,13,13,0.3);
  }

  .tonearm .headshell{
    position:absolute;
    bottom:-6px;
    left:50%;
    transform:translateX(-50%);
    width:16px;
    height:9px;
    background:var(--ink);
    border-radius:2px;
  }

  /* ---------- meta ---------- */

  .meta{
    text-align:center;
    margin:22px 0 20px;
  }

  .track-title{
    margin:0 0 6px;
    font-family:'Baloo 2', sans-serif;
    font-weight:700;
    font-size:24px;
    letter-spacing:0.01em;
    line-height:1.15;
  }

  .track-artist{
    margin:0;
    font-family:'IBM Plex Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    text-transform:uppercase;
    opacity:0.6;
  }

  /* ---------- progress ---------- */

  .progress{
    width:100%;
    max-width:340px;
    display:flex;
    align-items:center;
    gap:12px;
    margin-bottom:26px;
  }

  .time{
    font-family:'IBM Plex Mono', monospace;
    font-size:11px;
    opacity:0.65;
    min-width:34px;
  }
  .time.end{ text-align:right; }

  .bar{
    position:relative;
    flex:1;
    height:16px;
    display:flex;
    align-items:center;
    cursor:pointer;
  }
  .bar .track-line{
    position:absolute;
    left:0; right:0;
    height:3px;
    border-radius:3px;
    background:rgba(13,13,13,0.18);
  }
  .bar .fill{
    position:absolute;
    left:0;
    height:3px;
    border-radius:3px;
    background:var(--ink);
    width:0%;
  }
  .bar .knob{
    position:absolute;
    left:0%;
    width:11px;
    height:11px;
    border-radius:50%;
    background:var(--ink);
    box-shadow:0 0 0 3px var(--amber), 0 0 0 4px rgba(13,13,13,0.25);
    transform:translateX(-50%);
  }

  /* ---------- controls ---------- */

  .controls{
    display:flex;
    align-items:center;
    gap:26px;
  }

  .controls button{
    -webkit-appearance:none;
    appearance:none;
    border:none;
    background:none;
    padding:0;
    cursor:pointer;
    color:var(--ink);
    display:flex;
    align-items:center;
    justify-content:center;
  }

  .controls button:focus-visible{
    outline:2px solid var(--ink);
    outline-offset:4px;
    border-radius:50%;
  }

  .skip-btn svg{ width:20px; height:20px; }
  .skip-btn{ opacity:0.75; transition:opacity .15s ease, transform .15s ease; }
  .skip-btn:hover{ opacity:1; transform:translateY(-1px); }

  .play-btn{
    width:58px;
    height:58px;
    border-radius:50%;
    background:var(--ink);
    box-shadow:0 10px 22px -8px rgba(13,13,13,0.55);
    transition:transform .15s ease;
  }
  .play-btn:hover{ transform:scale(1.04); }
  .play-btn:active{ transform:scale(0.96); }
  .play-btn svg{ width:22px; height:22px; }
  .play-btn .pause-icon{ display:none; }
  .player.is-playing .play-btn .play-icon{ display:none; }
  .player.is-playing .play-btn .pause-icon{ display:block; }

  @media (prefers-reduced-motion: reduce){
    .disc{ animation:none !important; }
    .tonearm{ transition:none; }
  }
</style>
</head>

const tracks = [
  {
    title: "Midnight Frequency",
    artist: "Unknown Artist",
    duration: 214, // seconds — used until real audio metadata loads
    cover: "",
    src: ""
  },
  {
    title: "Static & Gold",
    artist: "Unknown Artist",
    duration: 187,
    cover: "repeating-linear-gradient(45deg, #FFBD59 0 10px, #F2A93B 10px 20px)",
    src: ""
  },
  {
    title: "Runout Groove",
    artist: "Unknown Artist",
    duration: 251,
    cover: "radial-gradient(circle at 35% 35%, #F2A93B, #1c1a17 75%)",
    src: ""
  }
];

let current = 0;
let isPlaying = false;
let fakeTimer = null;
let fakeElapsed = 0;

const player = document.getElementById('player');
const label = document.getElementById('label');
const trackTitle = document.getElementById('trackTitle');
const trackArtist = document.getElementById('trackArtist');
const curTimeEl = document.getElementById('curTime');
const durTimeEl = document.getElementById('durTime');
const fill = document.getElementById('fill');
const knob = document.getElementById('knob');
const bar = document.getElementById('bar');
const audio = document.getElementById('audio');
const playBtn = document.getElementById('playBtn');

function formatTime(s){
  s = Math.max(0, Math.floor(s));
  const m = Math.floor(s / 60);
  const sec = String(s % 60).padStart(2, '0');
  return `${m}:${sec}`;
}

function loadTrack(i, autoplay){
  stopFakeTimer();
  current = (i + tracks.length) % tracks.length;
  const t = tracks[current];

  trackTitle.textContent = t.title;
  trackArtist.textContent = t.artist;
  label.style.background = t.cover;
  durTimeEl.textContent = formatTime(t.duration);
  curTimeEl.textContent = "0:00";
  fill.style.width = "0%";
  knob.style.left = "0%";
  fakeElapsed = 0;

  if (t.src){
    audio.src = t.src;
    audio.load();
  } else {
    audio.removeAttribute('src');
    audio.load();
  }

  if (autoplay) play();
}

function play(){
  isPlaying = true;
  player.classList.add('is-playing');
  playBtn.setAttribute('aria-label', 'Pause');

  const t = tracks[current];
  if (t.src){
    audio.play().catch(() => startFakeTimer());
  } else {
    startFakeTimer();
  }
}

function pause(){
  isPlaying = false;
  player.classList.remove('is-playing');
  playBtn.setAttribute('aria-label', 'Play');
  audio.pause();
  stopFakeTimer();
}

function togglePlay(){
  isPlaying ? pause() : play();
}

/* demo progress for when no real audio source is set */
function startFakeTimer(){
  stopFakeTimer();
  fakeTimer = setInterval(() => {
    fakeElapsed += 0.25;
    const dur = tracks[current].duration;
    if (fakeElapsed >= dur){
      nextTrack();
      return;
    }
    updateProgress(fakeElapsed, dur);
  }, 250);
}
function stopFakeTimer(){
  if (fakeTimer) clearInterval(fakeTimer);
  fakeTimer = null;
}

function updateProgress(pos, dur){
  const pct = dur ? Math.min(100, (pos / dur) * 100) : 0;
  fill.style.width = pct + "%";
  knob.style.left = pct + "%";
  curTimeEl.textContent = formatTime(pos);
}

function nextTrack(){ loadTrack(current + 1, isPlaying); }
function prevTrack(){ loadTrack(current - 1, isPlaying); }

/* real <audio> element wiring, used automatically once a track has a src */
audio.addEventListener('timeupdate', () => {
  if (!tracks[current].src) return;
  updateProgress(audio.currentTime, audio.duration || tracks[current].duration);
});
audio.addEventListener('loadedmetadata', () => {
  if (!tracks[current].src) return;
  durTimeEl.textContent = formatTime(audio.duration);
});
audio.addEventListener('ended', nextTrack);

playBtn.addEventListener('click', togglePlay);
document.getElementById('nextBtn').addEventListener('click', () => nextTrack());
document.getElementById('prevBtn').addEventListener('click', () => prevTrack());

/* scrub */
function scrubTo(clientX){
  const rect = bar.getBoundingClientRect();
  const pct = Math.min(1, Math.max(0, (clientX - rect.left) / rect.width));
  const dur = tracks[current].src ? (audio.duration || tracks[current].duration) : tracks[current].duration;
  const pos = pct * dur;
  if (tracks[current].src){
    audio.currentTime = pos;
  } else {
    fakeElapsed = pos;
  }
  updateProgress(pos, dur);
}
let scrubbing = false;
bar.addEventListener('pointerdown', e => { scrubbing = true; scrubTo(e.clientX); });
window.addEventListener('pointermove', e => { if (scrubbing) scrubTo(e.clientX); });
window.addEventListener('pointerup', () => scrubbing = false);

loadTrack(0, false);
</script>

</body>
</html>
